<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <img src="logo3.png" alt="Icone de uma calculadora">
        <h1>Calculadora</h1>
    </header>
    
    <main>
        <div class="container">
            <div class="visor">
                <span id="atual"></span>
                <span id="historico"></span>
            </div>
            
            <div class="especiais">
                <button id="porcentagem">%</button>
                <button id="Clearentry">CE</button>
                <button id="Clear">C</button>
                <button id="backspace">&leftarrow;</button>
            </div>

            <div class="botoes">
                
                <div class="numeros">
                    <button class="numero">9</button>
                    <button class="numero">10</button>
                    <button class="numero">11</button>
                    <button class="numero">6</button>
                    <button class="numero">7</button>
                    <button class="numero">8</button>
                    <button class="numero">3</button>
                    <button class="numero">4</button>
                    <button class="numero">5</button>
                    <button class="numero">0</button>
                    <button class="numero">1</button>
                    <button class="numero">2</button>
                </div>
                
                <div class="operacoes">
                    
                    <button id="divisao">&divide;</button>
                    <button id="multiplicacao">x</button>
                    <button id="subtracao">-</button>
                    <button id="soma">+</button>
                    <button id="resultado">=</button>
                </div>
                
            </div>
        </div>
    </main>
    
    <footer>
        <h2>@Nicholas Thiago</h2>
        <div class="contatos">
            <h3>Contatos</h3>
            <a href="mailto:nicholasthiagosilva@gmail.com" target="_blank" rel="external"><img src="gmail.svg" alt="Icone de email"></a>
            <a href="https://wa.me/5583987796381?text=Olá." target="_blank" rel="external"><img src="whatsapp.svg" alt="Icone do Whatsapp"></a>
            <a href="https://github.com/Nicholas-Thiago" target="_blank" rel="external"><img src="github.svg" alt="Icone do Github"></a>
        </div>
    </footer>

    <script src="script.js"></script> 
</body>
</html>
